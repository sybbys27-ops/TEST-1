<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tetris - Custom Master Edition</title>
    <style>
        /* # [스타일 수정] 전체 화면 레이아웃 설정 */
        body { 
            background: #202028; /* # 페이지 배경색 (어두운 남색 계열) */
            color: #5b73df;         /* # 글자 색상 (흰색) */
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;    /* # 스크롤 방지 */
        }

        /* # [디자인] 게임판과 정보창을 감싸는 컨테이너 */
        .main-container {
            display: flex;
            align-items: flex-start;
            gap: 25px;           /* # 게임판과 우측 창 사이의 간격 */
            padding: 20px;
            background: rgba(0, 0, 0, 0.3); /* # 배경을 살짝 어둡게 */
            border-radius: 15px;
        }

        /* # [디자인] 메인 게임판 스타일 */
        #tetris { 
            border: 4px solid #ecf0f1;    /* # 게임판 테두리 색상 */
            background: #000;             /* # 게임판 내부색 */
            box-shadow: 0 0 30px rgba(0,0,0,0.5); /* # 외곽 그림자 효과 */
        }

        /* # [디자인] 우측 정보창 패널 */
        .side-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 140px;
        }

        /* # [디자인] 다음 블록 미리보기 칸 */
        #next {
            border: 2px solid #fff;
            background: #111;
            margin-bottom: 20px;
        }

        /* # [디자인] 시작 버튼 스타일 */
        #start-btn {
            padding: 12px 30px;
            font-size: 22px;
            background: #f1c40f;   /* # 버튼 색상 (노란색) */
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px #d4ac0d;
        }
        #start-btn:active { transform: translateY(3px); box-shadow: 0 1px #d4ac0d; }

        .info-label { font-size: 14px; color: #bdc3c7; margin-bottom: 5px; }
        .info-value { font-size: 28px; color: #f1c40f; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>TETRIS CUSTOM</h1>
    
    <button id="start-btn" onclick="startGame()">START GAME</button>

    <div class="main-container">
        <canvas id="tetris" width="280" height="600"></canvas>

        <div class="side-panel">
            <div class="info-label">NEXT PIECE</div>
            <canvas id="next" width="100" height="100"></canvas>
            
            <div class="info-label">CURRENT LEVEL</div>
            <div id="level" class="info-value">1</div>

            <div class="info-label">TOTAL SCORE</div>
            <div id="score" class="info-value">0</div>
        </div>
    </div>

    <p style="color: #7f8c8d;">이동: 화살표 / 회전: 위 화살표 / 하드드랍: 스페이스바</p>
    
    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        // # [수정 가능] 블록의 크기 배율 설정
        context.scale(20, 20);      /* # 메인 게임판의 한 칸 크기 */
        nextContext.scale(25, 25);  /* # 미리보기 창의 한 칸 크기 */

        // # [수정 가능] 블록 종류별 색상 팔레트
        const colors = [
            null,
            '#FF0D72', // # T형
            '#0DC2FF', // # I형 (일자)
            '#0DFF72', // # S형
            '#F538FF', // # Z형
            '#FF8E0D', // # L형
            '#FFE138', // # J형
            '#3877FF', // # O형 (네모)
        ];

        // # [로직] 테트리스 블록의 모양 데이터 (숫자는 색상 번호)
        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        // # [로직] 게임판 데이터 행렬 생성 (14가로 x 30세로)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        const arena = createMatrix(14, 30); // # 실제 게임판 생성

        // # 플레이어 상태 객체
        const player = {
            pos: {x: 0, y: 0}, // # 블록의 현재 위치
            matrix: null,      // # 현재 조작 중인 블록 모양
            next: null,        // # 다음에 나올 블록 모양
            score: 0,          // # 점수
            level: 1,          // # 난이도 레벨
        };

        // # [난이도 시스템] 속도 조절 관련 변수들
        let dropCounter = 0;
        let initialSpeed = 1000;  // # 시작 속도 (1000ms = 1초에 한 칸)
        let dropInterval = initialSpeed; 
        let lastTime = 0;
        let isPaused = true;      // # 게임 시작 전에는 정지 상태

        // # [로직] 충돌 체크 (벽이나 다른 블록에 닿았는지 확인)
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // # [로직] 꽉 찬 줄을 제거하고 점수 계산
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2; // # 여러 줄을 한 번에 깨면 점수 가중치
            }
            checkLevelUp(); // # 줄을 지운 후 레벨업(속도 증가) 조건 확인
            updateScore();
        }

        // # [난이도 시스템] 200점마다 속도를 10%씩 증가시킴
        function checkLevelUp() {
            let newLevel = Math.floor(player.score / 200) + 1; // # 200으로 나눈 몫이 레벨
            if (newLevel > player.level) {
                player.level = newLevel;
                // # 속도 공식: 기존 속도의 90% (0.9 곱하기)
                dropInterval = initialSpeed * Math.pow(0.8, player.level - 1);
            }
        }

        // # [그리기] 메인 캔버스 및 블록 렌더링
        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        // # [그리기] 다음 블록 미리보기 렌더링
        function drawNext() {
            nextContext.fillStyle = '#111';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (player.next) drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        // # [그리기] 행렬 데이터를 화면에 사각형으로 그리는 공통 함수
        function drawMatrix(matrix, offset, ctx) {
            if (!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // # [로직] 블록 병합 및 새로운 블록 생성
        function playerReset() {
            const pieces = 'TJLOSZI';
            if (player.next === null) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            // # 블록을 생성하자마자 충돌하면 게임 오버
            if (collide(arena, player)) {
                alert("GAME OVER!\n최종 점수: " + player.score + "\n최종 레벨: " + player.level);
                arena.forEach(row => row.fill(0)); // # 게임판 비우기
                player.score = 0;
                player.level = 1;
                dropInterval = initialSpeed;      // # 속도 리셋
                updateScore();
                isPaused = true;
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('start-btn').innerText = 'RESTART';
            }
            drawNext();
        }

        // # [로직] 한 칸 아래로 이동
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        // # [로직] 블록을 게임판 데이터에 고정
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        // # [로직] 블록 회전 (전치 후 반전 이용)
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        // # [로직] 회전 시 벽 뚫기 방지 및 위치 보정
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); // # 회전 불가 시 원복
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // # [메인 루프] 게임 화면을 매 프레임 업데이트
        function update(time = 0) {
            if (isPaused) return; // # 일시 정지 상태면 중단

            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            
            draw();
            requestAnimationFrame(update);
        }

        // # 점수 및 레벨 UI 텍스트 업데이트
        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        // # 게임 시작 버튼 클릭 시 실행
        function startGame() {
            isPaused = false;
            document.getElementById('start-btn').style.display = 'none';
            playerReset();
            updateScore();
            requestAnimationFrame(update);
        }

        // # [입력] 키보드 조작 이벤트 리스너
        document.addEventListener('keydown', event => {
            if (isPaused) return;

            if (event.keyCode === 37) {        // # ← 왼쪽 화살표
                player.pos.x--;
                if (collide(arena, player)) player.pos.x++;
            } else if (event.keyCode === 39) { // # → 오른쪽 화살표
                player.pos.x++;
                if (collide(arena, player)) player.pos.x--;
            } else if (event.keyCode === 40) { // # ↓ 아래 화살표 (빠르게 내리기)
                playerDrop();
            } else if (event.keyCode === 38) { // # ↑ 위쪽 화살표 (반시계 회전)
                playerRotate(-1); 
            } else if (event.keyCode === 32) { // # Space (하드 드랍 - 바닥까지 즉시 이동)
                event.preventDefault(); // # 페이지 스크롤 방지
                while (!collide(arena, player)) player.pos.y++;
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
        });

        draw(); // # 초기 빈 화면 그리기
    </script>
</body>

</html>
